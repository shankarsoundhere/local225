<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{font-family:Arial;background:#f1f3f6;padding:10px;text-align:center}
.box{background:white;padding:15px;border-radius:10px;max-width:430px;margin:auto}
button{width:100%;padding:12px;font-size:17px;margin:7px 0;background:#4285f4;color:white;border:none;border-radius:6px}
.printBtn{background:#000}
.exportBtn{background:#9b59b6}

.numberGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:10px 0}
.numBtn{font-size:24px;font-weight:bold;padding:15px 0;background:#222}
.greenBtn{background:#18b85b}
.redBtn{background:#ff4b4b}
.violetBtn{background:#9b59b6}

.header,.row{display:flex;align-items:center;border:1px solid #ddd;background:white}
.header{background:#4285f4;color:white;font-weight:bold;padding:10px 5px;margin-top:12px}
.row{padding:10px 5px;font-size:20px}
.col{flex:1;text-align:center}
.num{font-size:34px;font-weight:bold}
.type{font-size:22px;color:#222}

.green{color:#18b85b}
.red{color:#ff4b4b}
.violet{color:#9b59b6}

.delBtn{background:#ff4b4b;padding:6px;font-size:13px}
.editBtn{background:#28a745;padding:6px;font-size:13px}
.rowBtns{display:flex;gap:5px}

.popup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:999
}
.popupBox{background:white;padding:15px;border-radius:10px;width:90%;max-width:350px}
.editGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
input{width:100%;padding:12px;font-size:18px;box-sizing:border-box;margin:10px 0;text-align:center}

@media print{
.noPrint,.popup{display:none!important}
}
</style>
</head>

<body>

<div class="box">
<h2>Admin Panel</h2>

<div class="noPrint">
  <div class="numberGrid">
    <button class="numBtn greenBtn" onclick="addData(1)">1</button>
    <button class="numBtn redBtn" onclick="addData(2)">2</button>
    <button class="numBtn greenBtn" onclick="addData(3)">3</button>
    <button class="numBtn redBtn" onclick="addData(4)">4</button>
    <button class="numBtn violetBtn" onclick="addData(5)">5</button>
    <button class="numBtn redBtn" onclick="addData(6)">6</button>
    <button class="numBtn greenBtn" onclick="addData(7)">7</button>
    <button class="numBtn redBtn" onclick="addData(8)">8</button>
    <button class="numBtn greenBtn" onclick="addData(9)">9</button>
    <button class="numBtn redBtn" onclick="addData(0)">0</button>
  </div>

  <button class="printBtn" onclick="window.print()">Print</button>
  <button class="exportBtn" onclick="exportJSON()">Export JSON</button>
</div>

<div class="header">
  <div class="col">Number</div>
  <div class="col">Text</div>
  <div class="col">Colour</div>
  <div class="col noPrint">Action</div>
</div>

<div id="list"></div>
</div>

<!-- EDIT POPUP -->
<div class="popup" id="editPopup">
  <div class="popupBox">
    <h3>Edit Data</h3>
    <div class="editGrid">
      <button class="numBtn greenBtn" onclick="updateData(1)">1</button>
      <button class="numBtn redBtn" onclick="updateData(2)">2</button>
      <button class="numBtn greenBtn" onclick="updateData(3)">3</button>
      <button class="numBtn redBtn" onclick="updateData(4)">4</button>
      <button class="numBtn violetBtn" onclick="updateData(5)">5</button>
      <button class="numBtn redBtn" onclick="updateData(6)">6</button>
      <button class="numBtn greenBtn" onclick="updateData(7)">7</button>
      <button class="numBtn redBtn" onclick="updateData(8)">8</button>
      <button class="numBtn greenBtn" onclick="updateData(9)">9</button>
      <button class="numBtn redBtn" onclick="updateData(0)">0</button>
    </div>
    <button onclick="closeEdit()" style="background:#999">Cancel</button>
  </div>
</div>

<!-- DELETE POPUP -->
<div class="popup" id="deletePopup">
  <div class="popupBox">
    <h3>Delete Confirm</h3>
    <p>Delete करने के लिए code डालें</p>
    <input type="password" id="deleteCode" placeholder="1234 code">
    <button onclick="confirmDelete()" style="background:#ff4b4b">Delete</button>
    <button onclick="closeDelete()" style="background:#999">Cancel</button>
  </div>
</div>

<script>
const rule = {
  1:{type:"Small", color:"green"},
  2:{type:"Small", color:"red"},
  3:{type:"Small", color:"green"},
  4:{type:"Small", color:"red"},
  5:{type:"Big", color:"violet"},
  6:{type:"Big", color:"red"},
  7:{type:"Big", color:"green"},
  8:{type:"Big", color:"red"},
  9:{type:"Big", color:"green"},
  0:{type:"Small", color:"red"}
};

const STORAGE_KEY = "numberData";
let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
let editId = null;
let deleteId = null;

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  render();
}

function addData(num){
  let r = rule[num];
  data.unshift({
    id: Date.now().toString(),
    num: num,
    type: r.type,
    color: r.color,
    createdAt: Date.now()
  });
  save();
}

function render(){
  let html = "";
  data.forEach((d,i)=>{
    html += `
    <div class="row">
      <div class="col num ${d.color}">${d.num}</div>
      <div class="col type">${d.type}</div>
      <div class="col ${d.color}">${d.color.toUpperCase()}</div>
      <div class="col noPrint">
        <div class="rowBtns">
          <button class="editBtn" onclick="openEdit(${i})">Edit</button>
          <button class="delBtn" onclick="openDelete('${d.id}')">Del</button>
        </div>
      </div>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
}

function openEdit(i){
  editId = data[i].id;
  document.getElementById("editPopup").style.display = "flex";
}

function closeEdit(){
  document.getElementById("editPopup").style.display = "none";
}

function updateData(num){
  let r = rule[num];
  data = data.map(d=>{
    if(d.id === editId){
      return {...d, num:num, type:r.type, color:r.color};
    }
    return d;
  });
  save();
  closeEdit();
}

function openDelete(id){
  deleteId = id;
  document.getElementById("deleteCode").value = "";
  document.getElementById("deletePopup").style.display = "flex";
}

function closeDelete(){
  deleteId = null;
  document.getElementById("deletePopup").style.display = "none";
}

function confirmDelete(){
  let code = document.getElementById("deleteCode").value.trim();
  if(code !== "1234"){
    alert("गलत Code है");
    return;
  }
  data = data.filter(d=>d.id !== deleteId);
  save();
  closeDelete();
}

function exportJSON(){
  let cleanData = [...data].reverse();

  let blob = new Blob([JSON.stringify(cleanData, null, 2)], {
    type: "application/json"
  });

  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "number-data.json";
  a.click();
}

render();
</script>

</body>
</html>
